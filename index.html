<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">

        <h1>Task Manager</h1>


        <button id="privacyToggle">Incognito Mode</button> <!-- button to toggle incognito mode -->

        <div class="task-input">

            <input type="text" id="taskInput" placeholder="Enter a new task">

            <select id="energyTag">
                <option value="quick">Quick Win</option>
                <option value="deep">Deep Work</option>
            </select>

            <button id="addTaskBtn">Add Task</button>

        </div>

        <div class="progress-section">

            <div class="progress-section">

                <label>Progress</label>

                <div class="progress-bar">
                    <div id="progress"></div>
                </div>

                <p id="progressText">0% complete</p>

            </div>

        </div>

        <div class="filters">

            <button data-filter="all">All</button>
            <button data-filter="active">Active</button>
            <button data-filter="completed">Completed</button>
            <button data-filter="quick">Quick Win</button>
            <button data-filter="deep">Deep Work</button>

        </div>

        <ul id="taskList"></ul>

    </div>

    <div class="dashboard">

        <h2>Dashboard</h2>

        <div class="stats">

            <p>Total Tasks: <span id="totalTasks">0</span></p>
            <p>Completed: <span id="completedTasks">0</span></p>
            <p>Quick Tasks: <span id="quickTasks">0</span></p>
            <p>Deep Tasks: <span id="deepTasks">0</span></p>

        </div>

        <div class="insights">
            <h3>Insights</h3>
            <p id="insightText">No insights yet</p>
        </div>

    </div>

    <script src="script.js"></script>


</body>

</html>
